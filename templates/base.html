<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}NexaConnect — The next generation social platform.{% endblock %}">
    <title>{% block title %}NexaConnect{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="main-navbar">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="14" stroke="url(#grad)" stroke-width="2.5" fill="none"/>
                <circle cx="16" cy="10" r="3" fill="url(#grad)"/>
                <circle cx="10" cy="20" r="2.5" fill="url(#grad)"/>
                <circle cx="22" cy="20" r="2.5" fill="url(#grad)"/>
                <line x1="16" y1="13" x2="10" y2="18" stroke="url(#grad)" stroke-width="1.5"/>
                <line x1="16" y1="13" x2="22" y2="18" stroke="url(#grad)" stroke-width="1.5"/>
                <line x1="10" y1="20" x2="22" y2="20" stroke="url(#grad)" stroke-width="1"/>
                <defs>
                    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32">
                        <stop offset="0%" stop-color="#6c63ff"/>
                        <stop offset="100%" stop-color="#3b82f6"/>
                    </linearGradient>
                </defs>
            </svg>
            NexaConnect
        </a>
        <ul class="navbar-links">
            <li><a href="/" class="{% if active_page == 'home' %}active{% endif %}" id="nav-home">Home</a></li>
            <li><a href="/profile" class="{% if active_page == 'profile' %}active{% endif %}" id="nav-profile">Profile</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 NexaConnect. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="#" id="footer-privacy">Privacy</a></li>
                <li><a href="#" id="footer-terms">Terms</a></li>
                <li><a href="#" id="footer-support">Support</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
